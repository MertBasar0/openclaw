name: iOS Internal Test Setup

on:
  workflow_dispatch:
    inputs:
      tester_email:
        description: "Internal tester email (must be an App Store Connect user)"
        required: true
        type: string
      group_name:
        description: "Internal group name"
        required: false
        default: "Internal"
        type: string

concurrency:
  group: ios-internal
  cancel-in-progress: false

jobs:
  internal:
    name: Ensure internal TestFlight access
    runs-on: macos-26
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/ios

    steps:
      - uses: actions/checkout@v4

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Write ASC key file
        env:
          ASC_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Run internal test setup
        env:
          ASC_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          ASC_KEY_PATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          IOS_INTERNAL_TESTER_EMAIL: ${{ inputs.tester_email }}
          IOS_INTERNAL_GROUP_NAME: ${{ inputs.group_name }}
        run: fastlane ios internal_test
