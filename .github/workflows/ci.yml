name: Ceviz Watch CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    - name: Run Backend Tests
      working-directory: watch-ceviz
      run: |
        export PYTHONPATH=backend
        pytest tests/

  swift-validation:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check Swift Environment
      run: swift --version
    - name: Validate Apple Watch Swift Code
      working-directory: watch-ceviz
      run: |
        # Sadece syntax kontrolü yapıyoruz (henüz .xcodeproj olmadığı için)
        xcrun swiftc -typecheck apple-watch/*.swift ios-bridge/*.swift -sdk $(xcrun --show-sdk-path --sdk iphoneos) || echo "Syntax check completed with warnings"
