name: Ceviz Watch CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    - name: Run Backend Tests
      working-directory: watch-ceviz
      run: |
        export PYTHONPATH=backend
        pytest tests/

  xcode-build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.2.app || echo "Using default Xcode"
    - name: Install XcodeGen
      run: brew install xcodegen
    - name: Generate Xcode Project
      working-directory: watch-ceviz
      run: xcodegen generate
    - name: Build iOS App for Device
      working-directory: watch-ceviz
      run: |
        xcodebuild clean build \
          -project CevizWatch.xcodeproj \
          -scheme CevizBridge \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CONFIGURATION_BUILD_DIR="$(pwd)/build"
    - name: Inspect Build Output
      working-directory: watch-ceviz
      run: |
        echo "== build tree =="
        find build -maxdepth 4 -print | sort
        echo "== app bundle tree =="
        find build/CevizBridge.app -maxdepth 4 -print | sort
        echo "== embedded watch bundles =="
        find build/CevizBridge.app -type d \( -name '*.app' -o -name '*.appex' -o -name 'Watch' \) | sort
        echo "== plist summary =="
        /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' build/CevizBridge.app/Info.plist || true
        /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' build/CevizBridge.app/Info.plist || true
        /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' build/CevizBridge.app/Info.plist || true
        if [ -f build/CevizBridge.app/Watch/CevizWatchApp.app/Info.plist ]; then
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' build/CevizBridge.app/Watch/CevizWatchApp.app/Info.plist || true
          /usr/libexec/PlistBuddy -c 'Print :WKCompanionAppBundleIdentifier' build/CevizBridge.app/Watch/CevizWatchApp.app/Info.plist || true
          /usr/libexec/PlistBuddy -c 'Print :WKRunsIndependently' build/CevizBridge.app/Watch/CevizWatchApp.app/Info.plist || true
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' build/CevizBridge.app/Watch/CevizWatchApp.app/Info.plist || true
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' build/CevizBridge.app/Watch/CevizWatchApp.app/Info.plist || true
        else
          echo 'Watch companion app bundle not found at expected path'
        fi
        echo "== code signing artifacts =="
        find build/CevizBridge.app -maxdepth 4 \( -name 'embedded.mobileprovision' -o -name '_CodeSignature' \) -print | sort
    - name: Package Unsigned IPA
      working-directory: watch-ceviz
      run: |
        mkdir -p Payload
        mv build/CevizBridge.app Payload/
        zip -r CevizWatch.ipa Payload
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CevizWatch-IPA
        path: watch-ceviz/CevizWatch.ipa