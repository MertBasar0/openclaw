name: CevizWatch
options:
  bundleIdPrefix: com.openclaw
  generateEmptyDirectories: true
targets:
  CevizBridge:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ios-bridge
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.ceviz
        CODE_SIGNING_ALLOWED: "YES"
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLSchemes:
              - ceviz
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: YES
    dependencies:
      - target: CevizWatchApp
        embed: true

  CevizWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: apple-watch
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.ceviz.watchkitapp
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.openclaw.ceviz
        INFOPLIST_KEY_WKRunsIndependently: YES
        INFOPLIST_KEY_WKBackgroundModes:
          - self-care
        CODE_SIGNING_ALLOWED: "YES"
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: YES
